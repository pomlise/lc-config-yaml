version: 1.2.1

cache: true

registration:
  socialLogins: ["discord"]

endpoints:
  custom:
    # xai
    - name: "xai"
      apiKey: "user_provided"
      baseURL: "https://api.x.ai/v1"
      models:
        default: [
          grok-4.20-non-reasoning,
          grok-4-1-fast-non-reasoning,
          grok-4-fast-non-reasoning,
          grok-4
        ]
        fetch: false
      titleConvo: true
      titleMethod: "completion"
      titleModel: "grok-4"
      summarize: false
      summaryModel: "grok-4"
      forcePrompt: false
      modelDisplayLabel: "Grok"
    # together.ai
    #- name: "together.ai"
    #  apiKey: "user_provided"
    #  baseURL: "https://api.together.xyz"
    #  models:
    #    default: [
    #      "Qwen/Qwen3.5-397B-A17B"
    #    ]
    #    fetch: false # fetching list of models is not supported
    #  titleConvo: true
    #  titleModel: "Qwen/Qwen3.5-397B-A17B"
    #  summarize: false
    #  summaryModel: "Qwen/Qwen3.5-397B-A17B"
    #  modelDisplayLabel: "together.ai"
    # Deepseek
    - name: "Deepseek"
      apiKey: "user_provided"
      baseURL: "https://api.deepseek.com/v1"
      models:
        default: ["deepseek-chat", "deepseek-reasoner", "deepseek-coder"]
        fetch: false
      titleConvo: true
      titleModel: "deepseek-chat"
      modelDisplayLabel: "Deepseek"
    # cohere
    - name: "cohere"
      apiKey: "user_provided"
      baseURL: "https://api.cohere.ai/v1"
      models:
        default: ["command-a-03-2025", "command-r7b-12-2024", "command-r-plus-08-2024", "command-r-plus","command-r","command-light","command-light-nightly","command","command-nightly"]
        fetch: false
      modelDisplayLabel: "cohere"
      titleModel: "command"
      dropParams: ["stop", "user", "frequency_penalty", "presence_penalty", "temperature", "top_p"]
    # Mistral
    - name: "Mistral"
      apiKey: "user_provided"
      baseURL: "https://api.mistral.ai/v1"
      models:
        default: ["mistral-large-latest", "mistral-tiny", "mistral-small", "mistral-medium"]
        fetch: true
      titleConvo: true
      titleModel: "mistral-tiny"
      modelDisplayLabel: "Mistral"
      dropParams: ["stop", "user", "frequency_penalty", "presence_penalty"]
