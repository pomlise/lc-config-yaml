version: 1.2.1

cache: true

registration:
  socialLogins: ["discord"]

endpoints:
  custom:
    # xai
    - name: "xai"
      apiKey: "user_provided"
      baseURL: "https://api.x.ai/v1"
      models:
        default: [
          grok-4-fast-non-reasoning,
          grok-4.20-non-reasoning,
          grok-4.3-latest,
          grok-4
        ]
        fetch: false
      titleConvo: true
      titleMethod: "completion"
      titleModel: "grok-4"
      summarize: false
      summaryModel: "grok-4"
      forcePrompt: false
      modelDisplayLabel: "Grok"
    # Deepseek
    - name: "Deepseek"
      apiKey: "user_provided"
      baseURL: "https://api.deepseek.com"
      models:
        default: ["deepseek-v4-pro", "deepseek-v4-flash"]
        fetch: false
      titleConvo: true
      titleModel: "deepseek-chat"
      modelDisplayLabel: "Deepseek"
    # cohere
    - name: "cohere"
      apiKey: "user_provided"
      baseURL: "https://api.cohere.ai/compatibility/v1"
      models:
        default: ["command-a-plus-05-2026", "command-a-03-2025", "command-a-vision-07-2025"]
        fetch: false
      modelDisplayLabel: "cohere"
      titleModel: "command"
      dropParams: ["stop", "user", "frequency_penalty", "presence_penalty", "temperature", "top_p"]
    # Mistral
    - name: "Mistral"
      apiKey: "user_provided"
      baseURL: "https://api.mistral.ai/v1"
      models:
        default: ["mistral-large-latest", "mistral-tiny", "mistral-small", "mistral-medium"]
        fetch: true
      titleConvo: true
      titleModel: "mistral-tiny"
      modelDisplayLabel: "Mistral"
      dropParams: ["stop", "user", "frequency_penalty", "presence_penalty"]
